<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#060c14"/>
    </radialGradient>
    <radialGradient id="globe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a1f3d" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globe-clip">
      <circle cx="600" cy="200" r="170"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Ambient glow behind globe -->
  <ellipse cx="600" cy="200" rx="220" ry="220" fill="url(#glow-center)"/>

  <!-- Globe sphere -->
  <circle cx="600" cy="200" r="168" fill="url(#globe)" stroke="#1e4a7a" stroke-width="0.5" opacity="0.8"/>

  <!-- Latitude lines -->
  <g clip-path="url(#globe-clip)" opacity="0.18" stroke="#4a9eff" stroke-width="0.6" fill="none">
    <ellipse cx="600" cy="200" rx="168" ry="30"/>
    <ellipse cx="600" cy="200" rx="168" ry="70"/>
    <ellipse cx="600" cy="200" rx="168" ry="120"/>
    <ellipse cx="600" cy="200" rx="168" ry="155"/>
    <ellipse cx="600" cy="145" rx="120" ry="25"/>
    <ellipse cx="600" cy="255" rx="120" ry="25"/>
  </g>

  <!-- Longitude lines -->
  <g clip-path="url(#globe-clip)" opacity="0.18" stroke="#4a9eff" stroke-width="0.6" fill="none">
    <line x1="600" y1="32" x2="600" y2="368"/>
    <line x1="516" y1="35" x2="684" y2="365"/>
    <line x1="440" y1="50" x2="760" y2="350"/>
    <line x1="684" y1="35" x2="516" y2="365"/>
    <line x1="760" y1="50" x2="440" y2="350"/>
  </g>

  <!-- Connection lines (behind nodes) -->
  <!-- Major connections – bright -->
  <g opacity="0.35" stroke="#4a9eff" fill="none">
    <line x1="600" y1="200" x2="480" y2="120" stroke-width="1"/>
    <line x1="600" y1="200" x2="720" y2="130" stroke-width="1"/>
    <line x1="600" y1="200" x2="730" y2="270" stroke-width="1"/>
    <line x1="600" y1="200" x2="490" y2="290" stroke-width="1"/>
    <line x1="600" y1="200" x2="600" y2="80" stroke-width="1"/>
    <line x1="600" y1="200" x2="600" y2="330" stroke-width="0.8"/>
    <line x1="600" y1="200" x2="430" y2="200" stroke-width="0.8"/>
    <line x1="600" y1="200" x2="770" y2="200" stroke-width="0.8"/>
  </g>
  <!-- Secondary connections -->
  <g opacity="0.2" stroke="#7ec8ff" fill="none" stroke-width="0.6">
    <line x1="480" y1="120" x2="720" y2="130"/>
    <line x1="480" y1="120" x2="600" y2="80"/>
    <line x1="720" y1="130" x2="600" y2="80"/>
    <line x1="720" y1="130" x2="730" y2="270"/>
    <line x1="730" y1="270" x2="490" y2="290"/>
    <line x1="490" y1="290" x2="600" y2="330"/>
    <line x1="430" y1="200" x2="480" y2="120"/>
    <line x1="430" y1="200" x2="490" y2="290"/>
    <line x1="770" y1="200" x2="720" y2="130"/>
    <line x1="770" y1="200" x2="730" y2="270"/>
  </g>
  <!-- Outer connections -->
  <g opacity="0.15" stroke="#4a9eff" fill="none" stroke-width="0.5">
    <line x1="480" y1="120" x2="350" y2="80"/>
    <line x1="480" y1="120" x2="320" y2="150"/>
    <line x1="600" y1="80" x2="540" y2="38"/>
    <line x1="600" y1="80" x2="660" y2="38"/>
    <line x1="720" y1="130" x2="850" y2="80"/>
    <line x1="720" y1="130" x2="880" y2="150"/>
    <line x1="730" y1="270" x2="860" y2="310"/>
    <line x1="730" y1="270" x2="870" y2="240"/>
    <line x1="490" y1="290" x2="370" y2="330"/>
    <line x1="490" y1="290" x2="330" y2="260"/>
    <line x1="600" y1="330" x2="560" y2="370"/>
    <line x1="600" y1="330" x2="640" y2="370"/>
    <line x1="430" y1="200" x2="290" y2="185"/>
    <line x1="430" y1="200" x2="300" y2="220"/>
    <line x1="770" y1="200" x2="910" y2="185"/>
    <line x1="770" y1="200" x2="900" y2="220"/>
  </g>

  <!-- Outer leaf nodes (faint) -->
  <g fill="#4a9eff" opacity="0.4" filter="url(#blur-sm)">
    <circle cx="350" cy="80" r="3"/>
    <circle cx="320" cy="150" r="2.5"/>
    <circle cx="540" cy="38" r="2.5"/>
    <circle cx="660" cy="38" r="2.5"/>
    <circle cx="850" cy="80" r="3"/>
    <circle cx="880" cy="150" r="2.5"/>
    <circle cx="860" cy="310" r="2.5"/>
    <circle cx="870" cy="240" r="2.5"/>
    <circle cx="370" cy="330" r="3"/>
    <circle cx="330" cy="260" r="2.5"/>
    <circle cx="560" cy="370" r="2.5"/>
    <circle cx="640" cy="370" r="2.5"/>
    <circle cx="290" cy="185" r="3"/>
    <circle cx="300" cy="220" r="2.5"/>
    <circle cx="910" cy="185" r="3"/>
    <circle cx="900" cy="220" r="2.5"/>
  </g>

  <!-- Mid-ring nodes -->
  <g>
    <!-- Node glow halos -->
    <circle cx="480" cy="120" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="720" cy="130" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="730" cy="270" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="490" cy="290" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="600" cy="80"  r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="600" cy="330" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="430" cy="200" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <circle cx="770" cy="200" r="9" fill="#4a9eff" opacity="0.12" filter="url(#blur-lg)"/>
    <!-- Node dots -->
    <circle cx="480" cy="120" r="4" fill="#7ec8ff" opacity="0.9"/>
    <circle cx="720" cy="130" r="4" fill="#7ec8ff" opacity="0.9"/>
    <circle cx="730" cy="270" r="4" fill="#7ec8ff" opacity="0.9"/>
    <circle cx="490" cy="290" r="4" fill="#7ec8ff" opacity="0.9"/>
    <circle cx="600" cy="80"  r="3.5" fill="#7ec8ff" opacity="0.8"/>
    <circle cx="600" cy="330" r="3.5" fill="#7ec8ff" opacity="0.8"/>
    <circle cx="430" cy="200" r="3.5" fill="#7ec8ff" opacity="0.8"/>
    <circle cx="770" cy="200" r="3.5" fill="#7ec8ff" opacity="0.8"/>
  </g>

  <!-- Center node — the idea -->
  <circle cx="600" cy="200" r="22" fill="#4a9eff" opacity="0.08" filter="url(#blur-lg)"/>
  <circle cx="600" cy="200" r="14" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1.2" opacity="0.9"/>
  <circle cx="600" cy="200" r="7" fill="#4a9eff" opacity="0.95"/>

  <!-- Title -->
  <text x="600" y="218" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" letter-spacing="12" fill="white" opacity="0.06">NOOSPHERE</text>
  <text x="600" y="218" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="8" fill="white" opacity="0.92">NOOSPHERE</text>

  <!-- Subtitle -->
  <text x="600" y="248" text-anchor="middle" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="4" fill="#7ec8ff" opacity="0.7">SIMULATE THE SPHERE OF THOUGHT</text>

  <!-- Left decorative line -->
  <line x1="60" y1="200" x2="360" y2="200" stroke="#4a9eff" stroke-width="0.4" opacity="0.2"/>
  <line x1="60" y1="200" x2="240" y2="200" stroke="#4a9eff" stroke-width="0.8" opacity="0.35"/>
  <!-- Right decorative line -->
  <line x1="840" y1="200" x2="1140" y2="200" stroke="#4a9eff" stroke-width="0.4" opacity="0.2"/>
  <line x1="960" y1="200" x2="1140" y2="200" stroke="#4a9eff" stroke-width="0.8" opacity="0.35"/>

  <!-- Corner accents -->
  <g opacity="0.15" stroke="#4a9eff" stroke-width="1" fill="none">
    <path d="M 30 30 L 30 60 L 60 30 Z" opacity="0.4"/>
    <line x1="30" y1="30" x2="80" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="80"/>
    <line x1="1170" y1="30" x2="1120" y2="30"/>
    <line x1="1170" y1="30" x2="1170" y2="80"/>
    <line x1="30" y1="370" x2="80" y2="370"/>
    <line x1="30" y1="370" x2="30" y2="320"/>
    <line x1="1170" y1="370" x2="1120" y2="370"/>
    <line x1="1170" y1="370" x2="1170" y2="320"/>
  </g>
</svg>
